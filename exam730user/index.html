<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AB-730 Practice Exam &mdash; AI Business Professional</title>
    <link rel="icon" type="image/svg+xml" href="../images/favicon-exam730.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="../css/styles.css" />

    <style>
        /* ── Exam chrome ── */
        .exam-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
        }

        .exam-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .35rem .9rem;
            background: var(--purple-bg);
            border-radius: 999px;
            font-size: .78rem;
            font-weight: 700;
            color: var(--purple-mid);
        }

        .exam-timer {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* ── Progress ── */
        .progress-row {
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
            font-size: .85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .progress-bar-track {
            flex: 1;
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--purple-mid);
            border-radius: 3px;
            transition: width .3s;
        }

        /* ── Question card ── */
        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--sp-8);
            margin-bottom: var(--sp-6);
            box-shadow: var(--shadow-sm);
        }

        .question-domain {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--purple-mid);
            margin-bottom: var(--sp-2);
        }

        .question-number {
            font-size: .8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: var(--sp-4);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--purple-deep);
            line-height: 1.5;
            margin-bottom: var(--sp-6);
        }

        /* ── Answer options ── */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: var(--sp-3);
            padding: var(--sp-4) var(--sp-5);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            cursor: pointer;
            transition: all .2s;
            text-align: left;
            font-size: .95rem;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .option-btn:hover:not(.locked) {
            border-color: var(--purple-mid);
            background: var(--purple-bg);
        }

        .option-btn.selected {
            border-color: var(--purple-mid);
            background: var(--purple-bg);
        }

        .option-btn.locked {
            cursor: default;
        }

        .option-btn.correct {
            border-color: var(--green-badge);
            background: var(--green-light);
        }

        .option-btn.incorrect {
            border-color: var(--red-step);
            background: #fdecea;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border-light);
            font-weight: 700;
            font-size: .8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .option-btn.selected .option-letter {
            background: var(--purple-mid);
            color: #fff;
        }

        .option-btn.correct .option-letter {
            background: var(--green-badge);
            color: #fff;
        }

        .option-btn.incorrect .option-letter {
            background: var(--red-step);
            color: #fff;
        }

        .option-text {
            padding-top: 2px;
        }

        /* ── Explanation ── */
        .explanation {
            margin-top: var(--sp-4);
            padding: var(--sp-4) var(--sp-5);
            background: #f0f7ff;
            border-left: 4px solid var(--blue-step);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: .88rem;
            line-height: 1.6;
            color: var(--text-secondary);
            display: none;
        }

        .explanation.visible {
            display: block;
        }

        /* ── Nav buttons ── */
        .nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--sp-4);
            margin-bottom: var(--sp-8);
        }

        .nav-btn {
            padding: .6rem 1.5rem;
            border: 2px solid var(--purple-mid);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--purple-mid);
            font-weight: 600;
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--purple-mid);
            color: #fff;
        }

        .nav-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        .nav-btn.submit {
            border-color: var(--green-badge);
            color: var(--green-badge);
        }

        .nav-btn.submit:hover:not(:disabled) {
            background: var(--green-badge);
            color: #fff;
        }

        /* ── Question map ── */
        .qmap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: var(--sp-6);
        }

        .qmap-dot {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1.5px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all .15s;
            background: var(--bg-card);
        }

        .qmap-dot:hover {
            border-color: var(--purple-mid);
        }

        .qmap-dot.answered {
            background: var(--purple-bg);
            border-color: var(--purple-mid);
            color: var(--purple-mid);
        }

        .qmap-dot.current {
            background: var(--purple-mid);
            color: #fff;
            border-color: var(--purple-mid);
        }

        .qmap-dot.correct-dot {
            background: var(--green-light);
            border-color: var(--green-badge);
            color: var(--green-badge);
        }

        .qmap-dot.incorrect-dot {
            background: #fdecea;
            border-color: var(--red-step);
            color: var(--red-step);
        }

        /* ── Mark for review ── */
        .qmap-dot.flagged {
            border-color: var(--orange-step);
            position: relative;
        }

        .qmap-dot.flagged::after {
            content: "\25B2";
            position: absolute;
            top: -6px;
            right: -4px;
            font-size: 8px;
            color: var(--orange-step);
            line-height: 1;
        }

        .mark-review-btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem 1rem;
            border: 2px solid var(--orange-step);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--orange-step);
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
            font-family: var(--font-sans);
        }

        .mark-review-btn:hover {
            background: #fdf3e7;
        }

        .mark-review-btn.flagged {
            background: var(--orange-step);
            color: #fff;
        }

        .mark-review-btn.flagged:hover {
            background: #cf6d11;
        }

        .flagged-summary {
            font-size: .82rem;
            color: var(--orange-step);
            font-weight: 600;
            cursor: pointer;
            padding: .3rem .6rem;
            border-radius: var(--radius-sm);
            transition: background .15s;
        }

        .flagged-summary:hover {
            background: #fdf3e7;
        }

        .flagged-summary .flag-count {
            background: var(--orange-step);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: .72rem;
            margin-left: 4px;
        }

        /* ── Results ── */
        .results-panel {
            display: none;
        }

        .results-panel.visible {
            display: block;
        }

        .score-hero {
            text-align: center;
            padding: var(--sp-10) var(--sp-8);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            margin-bottom: var(--sp-6);
            box-shadow: var(--shadow-md);
        }

        .score-number {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: var(--sp-2);
        }

        .score-number.pass {
            color: var(--green-badge);
        }

        .score-number.fail {
            color: var(--red-step);
        }

        .score-label {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: var(--sp-4);
        }

        .score-badge {
            display: inline-block;
            padding: .4rem 1.2rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: .9rem;
        }

        .score-badge.pass {
            background: var(--green-light);
            color: var(--green-badge);
        }

        .score-badge.fail {
            background: #fdecea;
            color: var(--red-step);
        }

        .score-subtitle {
            margin-top: var(--sp-4);
            font-size: .85rem;
            color: var(--text-muted);
        }

        /* Domain breakdown */
        .domain-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
        }

        .domain-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--sp-5);
        }

        .domain-card-title {
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-muted);
            margin-bottom: var(--sp-3);
        }

        .domain-score {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: var(--sp-2);
        }

        .domain-score.pass {
            color: var(--green-badge);
        }

        .domain-score.fail {
            color: var(--red-step);
        }

        .domain-detail {
            font-size: .82rem;
            color: var(--text-secondary);
        }

        .domain-bar-track {
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            margin-top: var(--sp-3);
            overflow: hidden;
        }

        .domain-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .5s;
        }

        .domain-bar-fill.pass {
            background: var(--green-badge);
        }

        .domain-bar-fill.fail {
            background: var(--red-step);
        }

        /* Missed questions */
        .missed-section {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--sp-6);
            margin-bottom: var(--sp-6);
        }

        .missed-section h3 {
            font-size: 1rem;
            color: var(--purple-deep);
            margin-bottom: var(--sp-4);
        }

        .missed-item {
            padding: var(--sp-3) 0;
            border-bottom: 1px solid var(--border-light);
            font-size: .88rem;
        }

        .missed-item:last-child {
            border-bottom: none;
        }

        .missed-q {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--sp-1);
        }

        .missed-your {
            color: var(--red-step);
            font-size: .82rem;
        }

        .missed-correct {
            color: var(--green-badge);
            font-size: .82rem;
        }

        .all-correct-msg {
            color: var(--green-badge);
            font-weight: 600;
            font-size: .95rem;
        }

        /* Retake */
        .retake-row {
            text-align: center;
            margin-bottom: var(--sp-8);
        }

        .retake-btn {
            padding: .7rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            background: var(--purple-mid);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background .2s;
        }

        .retake-btn:hover {
            background: var(--purple-deep);
        }

        /* ── Hide exam while showing results ── */
        .exam-panel.hidden {
            display: none;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .question-card {
                padding: var(--sp-5);
            }

            .score-number {
                font-size: 3rem;
            }

            .qmap-dot {
                width: 28px;
                height: 28px;
                font-size: .65rem;
            }
        }
    </style>
</head>

<body>

    <div class="page-wrapper">
        <header class="page-hero">
            <h1>AB-730 Practice Exam</h1>
            <p class="subtitle">
                AI Business Professional &mdash; 40 multiple-choice questions across 3 domains.
                Passing score: 700 / 1000.
            </p>
        </header>

        <!-- ── Exam panel ── -->
        <div class="exam-panel" id="examPanel">

            <div class="exam-header">
                <span class="exam-badge">&#128220; Question <span id="qNum">1</span> of 40</span>
                <span class="exam-timer" id="examTimer">00:00</span>
            </div>

            <div class="progress-row">
                <span id="progressLabel">0% complete</span>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>

            <!-- Question map -->
            <div class="qmap" id="qmap"></div>

            <!-- Question -->
            <div class="question-card" id="questionCard">
                <div class="question-domain" id="qDomain"></div>
                <div class="question-number" id="qNumLabel"></div>
                <div class="question-text" id="qText"></div>
                <div class="options-list" id="optionsList"></div>
                <div class="explanation" id="explanation"></div>
            </div>

            <!-- Navigation -->
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" disabled>&#9664; Previous</button>
                <button class="mark-review-btn" id="markReviewBtn"
                    title="Flag this question to revisit before submitting">&#9873; Mark for Review</button>
                <span class="flagged-summary" id="flaggedSummary" style="display:none"
                    title="Click to jump to next flagged question">&#9873; Flagged: <span class="flag-count"
                        id="flagCount">0</span></span>
                <button class="nav-btn" id="nextBtn">Next &#9654;</button>
                <button class="nav-btn submit" id="submitBtn" style="display:none">&#9989; Submit Exam</button>
            </div>
        </div>

        <!-- ── Results panel ── -->
        <div class="results-panel" id="resultsPanel">
            <div class="score-hero">
                <div class="score-number" id="scoreNumber"></div>
                <div class="score-label">out of 1000</div>
                <div id="scoreBadge"></div>
                <div class="score-subtitle" id="scoreSubtitle"></div>
            </div>

            <h3 style="margin-bottom:var(--sp-4);color:var(--purple-deep);">Domain Breakdown</h3>
            <div class="domain-breakdown" id="domainBreakdown"></div>

            <div class="missed-section" id="missedSection">
                <h3>&#10060; Missed Questions</h3>
                <div id="missedList"></div>
            </div>

            <!-- Question map in results (color-coded) -->
            <h3 style="margin-bottom:var(--sp-4);color:var(--purple-deep);">Answer Map</h3>
            <div class="qmap" id="qmapResults"></div>

            <div class="retake-row" style="margin-top:var(--sp-6);">
                <button class="retake-btn" id="retakeBtn">&#128260; Retake Exam</button>
            </div>
        </div>

    </div>

    <script>
        /* ============================================================
           EXAM DATA — AB-730
           ============================================================ */
        const QUESTIONS = [
            { id: 1, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "What is generative AI?", correct: "AI that produces new content — text, images, summaries, code — from a prompt, rather than simply retrieving existing information.", wrong: ["AI that ranks and returns the most relevant existing documents from an indexed knowledge base in response to a query.", "AI that classifies an input (such as an email or image) into one of several predefined categories it was trained to recognize.", "AI that automates structured workflows by following deterministic rules defined by a business analyst."] },
            { id: 2, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "What is Microsoft 365 Copilot?", correct: "Microsoft's AI assistant embedded across M365 apps (Word, Excel, PowerPoint, Outlook, Teams). It uses large language models grounded in your work data via Microsoft Graph.", wrong: ["A low-code platform for building custom chatbots and agents that connect to external data sources and publish to Teams.", "A unified search experience inside SharePoint that uses semantic ranking to find files across the organization.", "An admin console in the Microsoft 365 admin center for managing user licenses, security policies, and compliance settings."] },
            { id: 3, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "How does Copilot keep your organization's data private?", correct: "Prompts and responses stay in your M365 tenant, are NOT used to train foundation models, and respect existing file permissions, sensitivity labels, and DLP policies.", wrong: ["Copilot prompts are encrypted in transit to a shared Azure OpenAI subscription, where they may be retained for up to 30 days for service improvement.", "Copilot uses Microsoft Purview to anonymize prompts before sending them to the foundation model, then re-identifies the response when it returns to the tenant.", "Copilot routes prompts through an Azure OpenAI Service provisioned in the customer's own Azure subscription and billed against Azure consumption."] },
            { id: 4, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "Name the three types of context that shape a Copilot response.", correct: "Work files (via Microsoft Graph), web data (public web, when enabled), and host app (the document, spreadsheet, or meeting you're in).", wrong: ["The user's role in Microsoft Entra ID, their assigned licenses, and the country listed in their user profile.", "The Azure region the tenant is hosted in, the data residency boundary, and the Microsoft 365 service plan.", "The model version (GPT-4, GPT-4 Turbo), the temperature setting, and the maximum token limit configured by the admin."] },
            { id: 5, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "What is the difference between a Copilot chat experience and an agent experience?", correct: "Chat = general-purpose, ad-hoc Q&A using broad context. Agent = purpose-built for a specific scenario, scoped to curated knowledge sources with custom instructions.", wrong: ["Chat runs against a smaller, faster model while agents always run against the full GPT-4 model for higher quality.", "Chat conversations are stored in OneDrive while agent conversations are stored in Dataverse for compliance.", "Chat is available in Word and Excel while agents are only available inside Microsoft Teams channels."] },
            { id: 6, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "When is creating your own agent a better choice than using Copilot Chat?", correct: "When you have a repeatable task with stable reference material (e.g., HR policy Q&A), need consistent answers across users, and want to scope responses to specific sources.", wrong: ["When you need access to a larger context window than Copilot Chat provides for very long documents.", "When you want answers grounded in real-time public web data instead of internal organizational content.", "When you need the response to use a model that has been fine-tuned on your organization's writing style."] },
            { id: 7, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "What are fabrications (hallucinations) in generative AI?", correct: "Plausible-sounding but incorrect outputs. Always verify facts, names, and numbers — especially statistics and citations.", wrong: ["Outputs that are blocked by the responsible AI content filter and replaced with a generic refusal message.", "Outputs flagged by Microsoft Purview as containing sensitive information and redacted before display.", "Outputs that exceed the model's context window and are truncated mid-sentence before reaching the user."] },
            { id: 8, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "What is prompt injection?", correct: "A risk where hidden or malicious instructions in referenced content (e.g., a pasted document) hijack the AI's behavior. Avoid running untrusted content through prompts.", wrong: ["A prompt-engineering pattern where you inject few-shot examples into the system message to improve response quality.", "A pricing model where additional context tokens are 'injected' into a prompt and billed at a higher rate than output tokens.", "A Copilot Studio feature that lets makers inject variables from Power Automate flows into agent prompts at runtime."] },
            { id: 9, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "What does 'over-reliance' on AI mean?", correct: "Accepting AI-generated output without human review. Treat every Copilot output as a first draft, not the final word.", wrong: ["Sending the same prompt to multiple AI providers and averaging the outputs to improve accuracy.", "Configuring Copilot to automatically retry failed prompts up to three times before returning an error.", "Letting Copilot decide which Microsoft Graph connectors to query based on the prompt's keywords."] },
            { id: 10, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "How do you verify a statistic that Copilot included in a summary?", correct: "Follow the citation link to the original source document and confirm the number there. Re-asking Copilot 'Are you sure?' is NOT verification.", wrong: ["Ask Copilot to rephrase the answer and check whether the same statistic appears in the rephrased version.", "Open the Copilot Audit Log in the Microsoft 365 admin center and verify the response was reviewed by the model.", "Switch Copilot to 'Precise' mode and re-run the prompt — Precise mode guarantees factually accurate numbers."] },
            { id: 11, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "How does data protection restrict Copilot results?", correct: "Copilot inherits sensitivity labels, DLP policies, and access controls. It never surfaces content the user doesn't already have permission to see.", wrong: ["Copilot applies retention labels to all generated responses and stores them in the user's mailbox for 7 years.", "Copilot uses Microsoft Defender for Cloud Apps to scan every prompt for malware before processing it.", "Copilot enforces conditional access policies that block responses when the user is connecting from an unmanaged device."] },
            { id: 12, domain: "domain1", domainLabel: "Domain 1 — Understand Generative AI Fundamentals", q: "How do Copilot features differ across M365 apps?", correct: "Word: draft/rewrite/summarize. Excel: formulas/analysis. PowerPoint: create decks. Outlook: thread summary/draft. Teams: meeting recap/catch-up. Each surface has app-specific capabilities.", wrong: ["Word, Excel, and PowerPoint share the same Copilot feature set; only Outlook and Teams offer different capabilities.", "Copilot in each app surfaces the same chat pane backed by Microsoft Graph; the only difference is the app's UI theme.", "All M365 apps offer the same draft, summarize, and analyze actions; the difference is which file types each app can open."] },
            { id: 13, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What are the four components of an effective Copilot prompt?", correct: "Goal (what you want), Context (audience, situation), Source (specific files, emails, meetings via /), and Expectation (format, length, tone).", wrong: ["Role, Task, Tools, and Output — the agent-builder framework used inside Copilot Studio.", "Persona, Audience, Format, and Length — the four required fields of the Prompt Gallery template.", "System message, user message, assistant message, and function call — the standard chat completion schema."] },
            { id: 14, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What does the / (slash) menu do in a Copilot prompt?", correct: "It lets you reference specific resources — files, emails, meetings, or people — to ground the response in precise sources instead of broad data.", wrong: ["It opens the agent picker so you can route the current prompt to a different agent in the Agent Store.", "It applies a saved prompt template from the Prompt Gallery to the current chat without retyping it.", "It inserts a system instruction that overrides the default Copilot guardrails for the current conversation."] },
            { id: 15, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "How do you save a prompt for reuse?", correct: "Pin it to the Prompt Gallery. You can also star prompts as favorites for one-click access from the Copilot home.", wrong: ["Save the prompt as a Loop component in OneDrive and re-insert it into chat whenever you need it.", "Export the chat as a .prompt file and re-upload it to Copilot the next time you want to run the same prompt.", "Add the prompt to your Outlook Quick Steps so it can be triggered from any Outlook conversation."] },
            { id: 16, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What does scheduling a prompt do?", correct: "Runs the prompt automatically on a recurring cadence (daily, weekly, etc.). Output is delivered to chat or email without manual effort.", wrong: ["Reserves dedicated Copilot capacity in your tenant so the prompt runs faster during peak business hours.", "Holds the prompt in a queue until your monthly token allowance resets, then submits it automatically.", "Triggers the prompt the next time a referenced file (e.g., a SharePoint document) is updated by another user."] },
            { id: 17, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "How can you share a prompt with your team?", correct: "Publish it to the team Prompt Gallery or share via a direct link. This ensures consistent, reusable prompts across the team.", wrong: ["Save the prompt as a Power Automate flow and grant your team run-only access to the flow.", "Convert the prompt into a Copilot Studio topic and publish the topic to a shared Teams channel.", "Pin the prompt to a SharePoint page and grant team members edit permissions on the page."] },
            { id: 18, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "How do you find a previous Copilot conversation?", correct: "Open chat history in Copilot and scroll or search by title. You can rename chats to make them easier to find later.", wrong: ["Use Microsoft Search in SharePoint to search for the conversation by keyword across the tenant.", "Open the Microsoft Purview audit log and filter by the 'CopilotInteraction' activity type.", "Check the Recent Items list in the M365 app launcher — Copilot conversations appear alongside recent files."] },
            { id: 19, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What happens when you delete a Copilot chat?", correct: "The conversation is permanently removed from your chat history. Use this for hygiene and to declutter.", wrong: ["The chat is archived to your Exchange mailbox under a hidden 'Copilot' folder for compliance retention.", "The chat is replaced with a placeholder showing the date and a summary, but the message text is removed.", "The chat is preserved in the tenant's Microsoft Purview eDiscovery hold for the configured retention period."] },
            { id: 20, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What is a Copilot Notebook?", correct: "A focused workspace grounded in chosen sources (files, chats, pages). Copilot answers inside a Notebook are scoped to that knowledge, keeping context tight.", wrong: ["A OneNote section that has been shared with Copilot so it can read and write notes on the user's behalf.", "A Loop component that captures Copilot conversations as a live, co-editable page across Teams and Outlook.", "A SharePoint page type that automatically embeds Copilot Chat with the page's content as default context."] },
            { id: 21, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What is the Agent Store?", correct: "A catalog of pre-built agents for common tasks (Researcher, Analyst, HR, IT, etc.). Always check here first before building a custom agent.", wrong: ["A marketplace inside Copilot Studio for purchasing additional connectors and premium AI models from third-party publishers.", "A SharePoint hub site that lists every custom agent created in the tenant for inventory and lifecycle reporting.", "A directory of Microsoft-certified consulting partners who can build custom agents on a fixed-price contract."] },
            { id: 22, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "When should you create a custom agent versus using the Agent Store?", correct: "When no pre-built agent fits your scenario and you need a scoped assistant with your own knowledge sources, instructions, and capabilities.", wrong: ["When you need an agent that can run inside a Teams channel — Agent Store agents are limited to Copilot Chat.", "When the pre-built agents are throttled by per-user token limits and you need higher throughput for your team.", "When you want the agent to use a non-Microsoft LLM such as Claude or Llama instead of the default GPT-4 model."] },
            { id: 23, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "How do you create an agent from a template?", correct: "Pick a template (FAQ bot, doc Q&A, concierge, etc.), add knowledge sources, set instructions and capabilities, then share with your team.", wrong: ["Open Copilot Studio, import a YAML manifest, and deploy the resulting bot to a Microsoft Entra app registration.", "Clone an existing agent from the Agent Store, then modify the inherited system prompt in the Microsoft 365 admin center.", "Create a new SharePoint site from a 'Copilot Agent' template — the site automatically generates a paired agent."] },
            { id: 24, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What types of knowledge can you add to an agent?", correct: "SharePoint sites, uploaded files (PDF, Word), web URLs, and data connectors (Dataverse, etc.).", wrong: ["Outlook mailboxes of all team members, individual Teams chats, and OneDrive folders shared with the agent owner.", "Live SQL Server queries, Azure Blob Storage containers, and on-premises file shares accessed via VPN.", "Encrypted email attachments protected by sensitivity labels, OneNote notebooks, and Microsoft Stream video transcripts."] },
            { id: 25, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What are agent 'settings' (as distinct from knowledge)?", correct: "Instructions (system prompt, tone, guardrails), capabilities (image gen, code interpreter, web search), and suggested prompts (starter questions for users).", wrong: ["Sharing scope, license assignment, and visibility in the Agent Store catalog for end-user discovery.", "Connector credentials, API throttling limits, and the Microsoft Entra app registration ID used by the agent.", "Retention policies, sensitivity-label defaults, and the audit-log destination for agent conversations."] },
            { id: 26, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What are suggested prompts on an agent?", correct: "Starter questions displayed to users when they open the agent. They reduce onboarding friction by showing what the agent can do.", wrong: ["Follow-up prompts the agent suggests after each response, based on what the user asked previously.", "Prompts auto-generated by Copilot from the agent's knowledge sources to fill out the Prompt Gallery.", "Prompts surfaced by Microsoft Graph based on the user's recent files and meetings, refreshed every hour."] },
            { id: 27, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "How do you share an agent with your team?", correct: "Via a direct link, the Agent catalog (org-wide discovery), or by embedding in a Teams channel. Users only see answers from content they're authorized to access.", wrong: ["Add the agent's Microsoft Entra app registration to a security group; group members inherit access automatically.", "Publish the agent to the Microsoft 365 app catalog as a sideloaded Teams app and assign it via setup policies.", "Save the agent to a Microsoft Loop workspace; everyone with workspace access gets read access to the agent."] },
            { id: 28, domain: "domain2", domainLabel: "Domain 2 — Manage Prompts and Conversations by Using AI", q: "What governance controls exist for agents?", correct: "Admins can govern agent creation, restrict connectors, and audit usage. Shared agents inherit knowledge-source permissions — users can't see unauthorized content.", wrong: ["Admins can only audit agent usage retroactively; agent creation and connector access cannot be restricted by policy.", "Governance is enforced solely through Microsoft Entra Conditional Access policies on the user's sign-in.", "Agent governance is configured per-agent by the maker; tenant-wide controls are not yet available in the admin center."] },
            { id: 29, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "What are the three ways to draft a document with Copilot in Word?", correct: "From a prompt ('Draft with Copilot'), from an existing document (rewrite or re-format), or as a management summary (one-page exec summary for a specific audience).", wrong: ["Inline auto-complete suggestions, Editor grammar rewrites, and Designer-style layout templates.", "From a OneNote page, from a Teams meeting transcript, and from an Outlook email thread that has been pinned.", "From a SharePoint list, from an Excel range, and from a Loop component embedded in the document."] },
            { id: 30, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "How do you generate a management summary of a long document?", correct: "Ask Copilot in Word: 'Create a 1-page executive summary for [audience]' while referencing the source document.", wrong: ["Open the document in PowerPoint and use 'Summarize as slide' to generate a one-slide executive summary.", "Convert the document to a Loop page; Copilot automatically inserts an 'Executive summary' section at the top.", "Apply the 'Executive Summary' Word template — Word auto-extracts headings and the first sentence of each section."] },
            { id: 31, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "How do you turn a Word document into a PowerPoint deck?", correct: "In PowerPoint, use Copilot: 'Create a presentation from this document' and reference the Word file. Copilot generates a draft deck.", wrong: ["In Word, use 'Export to PowerPoint' from the File menu — Word maps each heading level to a slide title automatically.", "In OneDrive, right-click the Word file and choose 'Open as presentation' — the file converts in place.", "In Copilot Chat, attach the Word file and ask for a deck; Copilot returns a downloadable .pptx file in the response."] },
            { id: 32, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "Name three ways to move data between M365 apps using Copilot.", correct: "Word → PowerPoint (doc to deck), Excel → Word/PPT (tables/insights), and Meeting recap → Outlook (follow-up email with action items).", wrong: ["OneDrive sync, Teams file tab, and SharePoint document libraries — the three storage layers underneath M365 apps.", "Power Automate flows, Power Query connections, and Microsoft Graph API calls — the three programmatic integrations.", "Copy-paste with formatting, drag-and-drop between app windows, and the Office Clipboard task pane."] },
            { id: 33, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "What does 'catch-up' mean in Copilot for Teams meetings?", correct: "A quick summary of what you missed if you joined a meeting late. It lets you jump in without asking 'What did I miss?'", wrong: ["A timeline view of meeting chapters generated after the meeting, letting you jump to specific topics in the recording.", "A daily digest in Outlook summarizing every meeting you missed across the previous business day.", "A Teams notification that pings you when a colleague mentions your name during a meeting you weren't invited to."] },
            { id: 34, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "What information does a Copilot meeting recap include?", correct: "Key points, decisions made, action items with owners, and an overall summary. Intelligent recap (Copilot license) goes deeper.", wrong: ["A sentiment-analysis chart showing each participant's mood over time, plus the meeting's overall tone score.", "A list of every file shared in the meeting chat plus a summary of which participant opened each file.", "A speaker-time breakdown showing how many minutes each participant talked, with no narrative summary."] },
            { id: 35, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "How can you find out who said what in a meeting?", correct: "Ask Copilot to search the transcript and attribute statements to specific participants — during or after the meeting.", wrong: ["Open the meeting recording in Microsoft Stream and use the speaker-timeline scrubber to jump between participants.", "Export the meeting transcript to a Word document — Word's Editor pane labels each paragraph with the speaker's name.", "Use Microsoft Purview eDiscovery to search the meeting's compliance record by participant and keyword."] },
            { id: 36, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "What is a Copilot Page?", correct: "A persistent, co-editable canvas built from a Copilot answer. Multiple people can edit in real time. Saved to OneDrive and shareable like any M365 file.", wrong: ["A SharePoint communication-site page with the Copilot Chat web part embedded so visitors can ask questions about the page.", "A Microsoft Loop workspace template that pre-populates a Copilot conversation pane alongside an empty Loop page.", "A read-only snapshot of a Copilot conversation, exported as a PDF and saved to the user's OneDrive automatically."] },
            { id: 37, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "How is a Copilot Page different from a chat response?", correct: "A chat response is temporary and single-user. A Page is persistent, shareable, and co-editable — designed for collaborative work.", wrong: ["A chat response is grounded in Microsoft Graph data, while a Page is grounded only in the public web.", "A chat response can be saved to OneDrive as a .copilot file, while a Page is saved as a .docx file in SharePoint.", "A chat response uses the user's individual Copilot license, while a Page consumes shared tenant-level capacity."] },
            { id: 38, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "What is Copilot memory?", correct: "An opt-in feature where Copilot recalls your preferences across chats (e.g., your role, team, preferred tone). You can review, edit, or clear memory at any time.", wrong: ["The conversation history pane in Copilot Chat where past prompts and responses are listed in chronological order.", "The cache of files that Microsoft Graph has indexed for the user, refreshed nightly to keep responses up to date.", "The retention period during which Copilot conversations are kept in the tenant's audit log for compliance review."] },
            { id: 39, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "What are Copilot custom instructions?", correct: "Defaults you set that Copilot applies to every prompt — like 'always use British English' or 'I manage the retail portfolio'. Managed in Copilot settings.", wrong: ["Tenant-level instructions configured by a Microsoft 365 admin that override every user's prompt with a corporate-tone preamble.", "Per-agent system prompts authored in Copilot Studio that define the agent's persona and guardrails.", "Slash commands such as /summarize or /draft that the user defines once and reuses across Copilot Chat."] },
            { id: 40, domain: "domain3", domainLabel: "Domain 3 — Draft and Analyze Business Content", q: "Which Copilot feature is best for a recurring weekly status email?", correct: "A scheduled prompt. Save the prompt, set it to run weekly, and have the output delivered to chat or email automatically.", wrong: ["A custom agent in Copilot Studio that connects to a Power Automate flow and triggers on a weekly recurrence schedule.", "An Outlook Quick Step that opens a new email and inserts a Copilot 'Draft with Copilot' prompt for the user to run.", "A Copilot Notebook pinned to OneDrive that the user re-opens each Friday to manually re-run the same prompt."] }
        ];

        const DOMAINS = {
            domain1: { label: "Domain 1 — Understand Generative AI Fundamentals", weight: "25–30%" },
            domain2: { label: "Domain 2 — Manage Prompts and Conversations by Using AI", weight: "35–40%" },
            domain3: { label: "Domain 3 — Draft and Analyze Business Content", weight: "25–30%" }
        };

        /* ============================================================
           STATE
           ============================================================ */
        let currentQ = 0;
        let answers = new Array(QUESTIONS.length).fill(null);
        let flagged = new Array(QUESTIONS.length).fill(false);
        let shuffledOptions = [];
        let correctIndices = [];
        let examStartTime = Date.now();
        let timerInterval = null;
        let submitted = false;

        /* ── DOM ── */
        const examPanel = document.getElementById("examPanel");
        const resultsPanel = document.getElementById("resultsPanel");
        const qNum = document.getElementById("qNum");
        const qDomain = document.getElementById("qDomain");
        const qNumLabel = document.getElementById("qNumLabel");
        const qText = document.getElementById("qText");
        const optionsList = document.getElementById("optionsList");
        const explanation = document.getElementById("explanation");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const submitBtn = document.getElementById("submitBtn");
        const progressLabel = document.getElementById("progressLabel");
        const progressFill = document.getElementById("progressFill");
        const qmap = document.getElementById("qmap");
        const examTimer = document.getElementById("examTimer");
        const markReviewBtn = document.getElementById("markReviewBtn");
        const flaggedSummary = document.getElementById("flaggedSummary");
        const flagCount = document.getElementById("flagCount");

        /* ============================================================
           INIT
           ============================================================ */
        function initExam() {
            shuffledOptions = [];
            correctIndices = [];
            answers = new Array(QUESTIONS.length).fill(null);
            flagged = new Array(QUESTIONS.length).fill(false);
            currentQ = 0;
            submitted = false;
            examStartTime = Date.now();

            QUESTIONS.forEach((q) => {
                // Build index array [0,1,2,3] where 0 = correct
                const indices = [0, 1, 2, 3];
                // Fisher–Yates shuffle the indices
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                const allAnswers = [q.correct, ...q.wrong];
                const opts = indices.map(idx => allAnswers[idx]);
                shuffledOptions.push(opts);
                correctIndices.push(indices.indexOf(0));
            });

            buildQMap();
            renderQuestion();
            startTimer();

            examPanel.classList.remove("hidden");
            resultsPanel.classList.remove("visible");
        }

        /* ============================================================
           TIMER
           ============================================================ */
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, "0");
                const s = String(elapsed % 60).padStart(2, "0");
                examTimer.textContent = `${m}:${s}`;
            }, 1000);
        }

        /* ============================================================
           QUESTION MAP
           ============================================================ */
        function buildQMap() {
            qmap.innerHTML = QUESTIONS.map((_, i) =>
                `<div class="qmap-dot" data-qi="${i}">${i + 1}</div>`
            ).join("");
            qmap.querySelectorAll(".qmap-dot").forEach(dot => {
                dot.addEventListener("click", () => {
                    currentQ = parseInt(dot.dataset.qi);
                    renderQuestion();
                });
            });
        }

        function updateQMap() {
            qmap.querySelectorAll(".qmap-dot").forEach((dot, i) => {
                dot.classList.remove("current", "answered", "flagged");
                if (i === currentQ) dot.classList.add("current");
                else if (answers[i] !== null) dot.classList.add("answered");
                if (flagged[i]) dot.classList.add("flagged");
            });
        }

        /* ============================================================
           RENDER QUESTION
           ============================================================ */
        function renderQuestion() {
            const q = QUESTIONS[currentQ];
            const opts = shuffledOptions[currentQ];
            const letters = ["A", "B", "C", "D"];

            qNum.textContent = currentQ + 1;
            qDomain.textContent = q.domainLabel;
            qNumLabel.textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
            qText.textContent = q.q;

            const answeredIdx = answers[currentQ];

            optionsList.innerHTML = opts.map((opt, i) => {
                let cls = "option-btn";
                if (submitted) {
                    cls += " locked";
                    if (i === correctIndices[currentQ]) cls += " correct";
                    else if (i === answeredIdx && i !== correctIndices[currentQ]) cls += " incorrect";
                } else if (i === answeredIdx) {
                    cls += " selected";
                }
                return `<button class="${cls}" data-oi="${i}">
                    <span class="option-letter">${letters[i]}</span>
                    <span class="option-text">${opt}</span>
                </button>`;
            }).join("");

            if (!submitted) {
                optionsList.querySelectorAll(".option-btn").forEach(btn => {
                    btn.addEventListener("click", () => selectOption(parseInt(btn.dataset.oi)));
                });
            }

            if (submitted) {
                explanation.textContent = `Correct answer: ${q.correct}`;
                explanation.classList.add("visible");
            } else {
                explanation.classList.remove("visible");
            }

            const answered = answers.filter(a => a !== null).length;
            const pct = Math.round((answered / QUESTIONS.length) * 100);
            progressLabel.textContent = `${pct}% complete (${answered}/${QUESTIONS.length} answered)`;
            progressFill.style.width = `${pct}%`;

            prevBtn.disabled = currentQ === 0;
            if (submitted) {
                nextBtn.style.display = currentQ < QUESTIONS.length - 1 ? "" : "none";
                submitBtn.style.display = "none";
                markReviewBtn.style.display = "none";
                flaggedSummary.style.display = "none";
            } else {
                nextBtn.style.display = currentQ < QUESTIONS.length - 1 ? "" : "none";
                submitBtn.style.display = answered === QUESTIONS.length ? "" : "none";
                updateFlagUI();
            }

            updateQMap();
        }

        function selectOption(idx) {
            if (submitted) return;
            answers[currentQ] = idx;
            renderQuestion();
        }

        /* ============================================================
           MARK FOR REVIEW
           ============================================================ */
        function toggleFlag() {
            if (submitted) return;
            flagged[currentQ] = !flagged[currentQ];
            updateFlagUI();
            updateQMap();
        }

        function updateFlagUI() {
            const isFlagged = flagged[currentQ];
            markReviewBtn.classList.toggle("flagged", isFlagged);
            markReviewBtn.innerHTML = isFlagged ? "&#9873; Marked" : "&#9873; Mark for Review";
            markReviewBtn.style.display = "";

            const total = flagged.filter(Boolean).length;
            if (total > 0) {
                flaggedSummary.style.display = "";
                flagCount.textContent = total;
            } else {
                flaggedSummary.style.display = "none";
            }
        }

        function jumpToNextFlagged() {
            const total = flagged.filter(Boolean).length;
            if (total === 0) return;
            // Search forward from current, wrapping around
            for (let offset = 1; offset <= QUESTIONS.length; offset++) {
                const idx = (currentQ + offset) % QUESTIONS.length;
                if (flagged[idx]) {
                    currentQ = idx;
                    renderQuestion();
                    return;
                }
            }
        }

        /* ============================================================
           SUBMIT
           ============================================================ */
        function submitExam() {
            if (!confirm("Submit your exam? You won't be able to change answers.")) return;
            submitted = true;
            if (timerInterval) clearInterval(timerInterval);
            showResults();
        }

        function showResults() {
            examPanel.classList.add("hidden");
            resultsPanel.classList.add("visible");

            let totalCorrect = 0;
            const domainStats = {};
            const missed = [];

            QUESTIONS.forEach((q, i) => {
                if (!domainStats[q.domain]) domainStats[q.domain] = { total: 0, correct: 0 };
                domainStats[q.domain].total++;
                if (answers[i] === correctIndices[i]) {
                    totalCorrect++;
                    domainStats[q.domain].correct++;
                } else {
                    missed.push({
                        id: q.id,
                        question: q.q,
                        domain: q.domainLabel,
                        yourAnswer: answers[i] !== null ? shuffledOptions[i][answers[i]] : "(unanswered)",
                        correctAnswer: q.correct
                    });
                }
            });

            const score = Math.round((totalCorrect / QUESTIONS.length) * 1000);
            const passed = score >= 700;

            const scoreNumber = document.getElementById("scoreNumber");
            scoreNumber.textContent = score;
            scoreNumber.className = "score-number " + (passed ? "pass" : "fail");

            const scoreBadge = document.getElementById("scoreBadge");
            scoreBadge.innerHTML = `<span class="score-badge ${passed ? "pass" : "fail"}">${passed ? "PASS ✓" : "FAIL ✗"}</span>`;

            document.getElementById("scoreSubtitle").textContent =
                `${totalCorrect} of ${QUESTIONS.length} correct · Passing: 700 · Time: ${examTimer.textContent}`;

            const domainBreakdown = document.getElementById("domainBreakdown");
            domainBreakdown.innerHTML = Object.entries(DOMAINS).map(([key, d]) => {
                const s = domainStats[key] || { total: 0, correct: 0 };
                const pct = s.total ? Math.round((s.correct / s.total) * 100) : 0;
                const dp = pct >= 70;
                return `<div class="domain-card">
                    <div class="domain-card-title">${d.label} <span style="opacity:.5">(${d.weight})</span></div>
                    <div class="domain-score ${dp ? "pass" : "fail"}">${pct}%</div>
                    <div class="domain-detail">${s.correct} / ${s.total} correct</div>
                    <div class="domain-bar-track"><div class="domain-bar-fill ${dp ? "pass" : "fail"}" style="width:${pct}%"></div></div>
                </div>`;
            }).join("");

            const missedList = document.getElementById("missedList");
            if (missed.length === 0) {
                missedList.innerHTML = '<div class="all-correct-msg">Perfect score! You answered every question correctly.</div>';
            } else {
                missedList.innerHTML = missed.map(m =>
                    `<div class="missed-item">
                        <div class="missed-q">Q${String(m.id).padStart(2, "0")}: ${m.question}</div>
                        <div class="missed-your">Your answer: ${m.yourAnswer}</div>
                        <div class="missed-correct">Correct: ${m.correctAnswer}</div>
                    </div>`
                ).join("");
            }

            const qmapResults = document.getElementById("qmapResults");
            qmapResults.innerHTML = QUESTIONS.map((_, i) => {
                const isCorrect = answers[i] === correctIndices[i];
                return `<div class="qmap-dot ${isCorrect ? "correct-dot" : "incorrect-dot"}" data-qi="${i}" title="Q${i + 1}">${i + 1}</div>`;
            }).join("");
            qmapResults.querySelectorAll(".qmap-dot").forEach(dot => {
                dot.addEventListener("click", () => {
                    currentQ = parseInt(dot.dataset.qi);
                    examPanel.classList.remove("hidden");
                    resultsPanel.classList.remove("visible");
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        }

        /* ============================================================
           EVENT LISTENERS
           ============================================================ */
        prevBtn.addEventListener("click", () => { if (currentQ > 0) { currentQ--; renderQuestion(); } });
        nextBtn.addEventListener("click", () => { if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); } });
        markReviewBtn.addEventListener("click", toggleFlag);
        flaggedSummary.addEventListener("click", jumpToNextFlagged);
        submitBtn.addEventListener("click", submitExam);
        document.getElementById("retakeBtn").addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
            initExam();
        });

        document.addEventListener("keydown", (e) => {
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
            if (submitted && (e.key === "ArrowRight" || e.key === "ArrowLeft")) {
                e.preventDefault();
                if (e.key === "ArrowRight" && currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); }
                if (e.key === "ArrowLeft" && currentQ > 0) { currentQ--; renderQuestion(); }
                return;
            }
            if (submitted) return;
            switch (e.key) {
                case "ArrowRight": e.preventDefault(); if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); } break;
                case "ArrowLeft": e.preventDefault(); if (currentQ > 0) { currentQ--; renderQuestion(); } break;
                case "a": case "A": e.preventDefault(); selectOption(0); break;
                case "b": case "B": e.preventDefault(); selectOption(1); break;
                case "c": case "C": e.preventDefault(); selectOption(2); break;
                case "d": case "D": e.preventDefault(); selectOption(3); break;
                case "m": case "M": e.preventDefault(); toggleFlag(); break;
            }
        });

        /* ============================================================
           INIT
           ============================================================ */
        initExam();
    </script>
