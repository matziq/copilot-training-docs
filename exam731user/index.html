<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AB-731 Practice Exam &mdash; AI Transformation Leader</title>
    <link rel="icon" type="image/svg+xml" href="../images/favicon-exam731.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="../css/styles.css" />

    <style>
        /* ── Exam chrome ── */
        .exam-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
        }

        .exam-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .35rem .9rem;
            background: var(--purple-bg);
            border-radius: 999px;
            font-size: .78rem;
            font-weight: 700;
            color: var(--purple-mid);
        }

        .exam-timer {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* ── Progress ── */
        .progress-row {
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
            font-size: .85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .progress-bar-track {
            flex: 1;
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--purple-mid);
            border-radius: 3px;
            transition: width .3s;
        }

        /* ── Question card ── */
        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--sp-8);
            margin-bottom: var(--sp-6);
            box-shadow: var(--shadow-sm);
        }

        .question-domain {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--purple-mid);
            margin-bottom: var(--sp-2);
        }

        .question-number {
            font-size: .8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: var(--sp-4);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--purple-deep);
            line-height: 1.5;
            margin-bottom: var(--sp-6);
        }

        /* ── Answer options ── */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: var(--sp-3);
            padding: var(--sp-4) var(--sp-5);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            cursor: pointer;
            transition: all .2s;
            text-align: left;
            font-size: .95rem;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .option-btn:hover:not(.locked) {
            border-color: var(--purple-mid);
            background: var(--purple-bg);
        }

        .option-btn.selected {
            border-color: var(--purple-mid);
            background: var(--purple-bg);
        }

        .option-btn.locked {
            cursor: default;
        }

        .option-btn.correct {
            border-color: var(--green-badge);
            background: var(--green-light);
        }

        .option-btn.incorrect {
            border-color: var(--red-step);
            background: #fdecea;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border-light);
            font-weight: 700;
            font-size: .8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .option-btn.selected .option-letter {
            background: var(--purple-mid);
            color: #fff;
        }

        .option-btn.correct .option-letter {
            background: var(--green-badge);
            color: #fff;
        }

        .option-btn.incorrect .option-letter {
            background: var(--red-step);
            color: #fff;
        }

        .option-text {
            padding-top: 2px;
        }

        /* ── Explanation ── */
        .explanation {
            margin-top: var(--sp-4);
            padding: var(--sp-4) var(--sp-5);
            background: #f0f7ff;
            border-left: 4px solid var(--blue-step);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: .88rem;
            line-height: 1.6;
            color: var(--text-secondary);
            display: none;
        }

        .explanation.visible {
            display: block;
        }

        /* ── Nav buttons ── */
        .nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--sp-4);
            margin-bottom: var(--sp-8);
        }

        .nav-btn {
            padding: .6rem 1.5rem;
            border: 2px solid var(--purple-mid);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--purple-mid);
            font-weight: 600;
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--purple-mid);
            color: #fff;
        }

        .nav-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        .nav-btn.submit {
            border-color: var(--green-badge);
            color: var(--green-badge);
        }

        .nav-btn.submit:hover:not(:disabled) {
            background: var(--green-badge);
            color: #fff;
        }

        /* ── Question map ── */
        .qmap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: var(--sp-6);
        }

        .qmap-dot {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1.5px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all .15s;
            background: var(--bg-card);
        }

        .qmap-dot:hover {
            border-color: var(--purple-mid);
        }

        .qmap-dot.answered {
            background: var(--purple-bg);
            border-color: var(--purple-mid);
            color: var(--purple-mid);
        }

        .qmap-dot.current {
            background: var(--purple-mid);
            color: #fff;
            border-color: var(--purple-mid);
        }

        .qmap-dot.correct-dot {
            background: var(--green-light);
            border-color: var(--green-badge);
            color: var(--green-badge);
        }

        .qmap-dot.incorrect-dot {
            background: #fdecea;
            border-color: var(--red-step);
            color: var(--red-step);
        }

        /* ── Mark for review ── */
        .qmap-dot.flagged {
            border-color: var(--orange-step);
            position: relative;
        }

        .qmap-dot.flagged::after {
            content: "\25B2";
            position: absolute;
            top: -6px;
            right: -4px;
            font-size: 8px;
            color: var(--orange-step);
            line-height: 1;
        }

        .mark-review-btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem 1rem;
            border: 2px solid var(--orange-step);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--orange-step);
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
            font-family: var(--font-sans);
        }

        .mark-review-btn:hover {
            background: #fdf3e7;
        }

        .mark-review-btn.flagged {
            background: var(--orange-step);
            color: #fff;
        }

        .mark-review-btn.flagged:hover {
            background: #cf6d11;
        }

        .flagged-summary {
            font-size: .82rem;
            color: var(--orange-step);
            font-weight: 600;
            cursor: pointer;
            padding: .3rem .6rem;
            border-radius: var(--radius-sm);
            transition: background .15s;
        }

        .flagged-summary:hover {
            background: #fdf3e7;
        }

        .flagged-summary .flag-count {
            background: var(--orange-step);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: .72rem;
            margin-left: 4px;
        }

        /* ── Results ── */
        .results-panel {
            display: none;
        }

        .results-panel.visible {
            display: block;
        }

        .score-hero {
            text-align: center;
            padding: var(--sp-10) var(--sp-8);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            margin-bottom: var(--sp-6);
            box-shadow: var(--shadow-md);
        }

        .score-number {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: var(--sp-2);
        }

        .score-number.pass {
            color: var(--green-badge);
        }

        .score-number.fail {
            color: var(--red-step);
        }

        .score-label {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: var(--sp-4);
        }

        .score-badge {
            display: inline-block;
            padding: .4rem 1.2rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: .9rem;
        }

        .score-badge.pass {
            background: var(--green-light);
            color: var(--green-badge);
        }

        .score-badge.fail {
            background: #fdecea;
            color: var(--red-step);
        }

        .score-subtitle {
            margin-top: var(--sp-4);
            font-size: .85rem;
            color: var(--text-muted);
        }

        /* Domain breakdown */
        .domain-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
        }

        .domain-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--sp-5);
        }

        .domain-card-title {
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-muted);
            margin-bottom: var(--sp-3);
        }

        .domain-score {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: var(--sp-2);
        }

        .domain-score.pass {
            color: var(--green-badge);
        }

        .domain-score.fail {
            color: var(--red-step);
        }

        .domain-detail {
            font-size: .82rem;
            color: var(--text-secondary);
        }

        .domain-bar-track {
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            margin-top: var(--sp-3);
            overflow: hidden;
        }

        .domain-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .5s;
        }

        .domain-bar-fill.pass {
            background: var(--green-badge);
        }

        .domain-bar-fill.fail {
            background: var(--red-step);
        }

        /* Missed questions */
        .missed-section {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--sp-6);
            margin-bottom: var(--sp-6);
        }

        .missed-section h3 {
            font-size: 1rem;
            color: var(--purple-deep);
            margin-bottom: var(--sp-4);
        }

        .missed-item {
            padding: var(--sp-3) 0;
            border-bottom: 1px solid var(--border-light);
            font-size: .88rem;
        }

        .missed-item:last-child {
            border-bottom: none;
        }

        .missed-q {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--sp-1);
        }

        .missed-your {
            color: var(--red-step);
            font-size: .82rem;
        }

        .missed-correct {
            color: var(--green-badge);
            font-size: .82rem;
        }

        .all-correct-msg {
            color: var(--green-badge);
            font-weight: 600;
            font-size: .95rem;
        }

        /* Retake */
        .retake-row {
            text-align: center;
            margin-bottom: var(--sp-8);
        }

        .retake-btn {
            padding: .7rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            background: var(--purple-mid);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background .2s;
        }

        .retake-btn:hover {
            background: var(--purple-deep);
        }

        /* ── Hide exam while showing results ── */
        .exam-panel.hidden {
            display: none;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .question-card {
                padding: var(--sp-5);
            }

            .score-number {
                font-size: 3rem;
            }

            .qmap-dot {
                width: 28px;
                height: 28px;
                font-size: .65rem;
            }
        }
    </style>
</head>

<body>

    <div class="page-wrapper">
        <header class="page-hero">
            <h1>AB-731 Practice Exam</h1>
            <p class="subtitle">
                AI Transformation Leader &mdash; 40 multiple-choice questions across 3 domains.
                Passing score: 700 / 1000.
            </p>
        </header>

        <!-- ── Exam panel ── -->
        <div class="exam-panel" id="examPanel">

            <div class="exam-header">
                <span class="exam-badge">&#128220; Question <span id="qNum">1</span> of 40</span>
                <span class="exam-timer" id="examTimer">00:00</span>
            </div>

            <div class="progress-row">
                <span id="progressLabel">0% complete</span>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>

            <!-- Question map -->
            <div class="qmap" id="qmap"></div>

            <!-- Question -->
            <div class="question-card" id="questionCard">
                <div class="question-domain" id="qDomain"></div>
                <div class="question-number" id="qNumLabel"></div>
                <div class="question-text" id="qText"></div>
                <div class="options-list" id="optionsList"></div>
                <div class="explanation" id="explanation"></div>
            </div>

            <!-- Navigation -->
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" disabled>&#9664; Previous</button>
                <button class="mark-review-btn" id="markReviewBtn"
                    title="Flag this question to revisit before submitting">&#9873; Mark for Review</button>
                <span class="flagged-summary" id="flaggedSummary" style="display:none"
                    title="Click to jump to next flagged question">&#9873; Flagged: <span class="flag-count"
                        id="flagCount">0</span></span>
                <button class="nav-btn" id="nextBtn">Next &#9654;</button>
                <button class="nav-btn submit" id="submitBtn" style="display:none">&#9989; Submit Exam</button>
            </div>
        </div>

        <!-- ── Results panel ── -->
        <div class="results-panel" id="resultsPanel">
            <div class="score-hero">
                <div class="score-number" id="scoreNumber"></div>
                <div class="score-label">out of 1000</div>
                <div id="scoreBadge"></div>
                <div class="score-subtitle" id="scoreSubtitle"></div>
            </div>

            <h3 style="margin-bottom:var(--sp-4);color:var(--purple-deep);">Domain Breakdown</h3>
            <div class="domain-breakdown" id="domainBreakdown"></div>

            <div class="missed-section" id="missedSection">
                <h3>&#10060; Missed Questions</h3>
                <div id="missedList"></div>
            </div>

            <!-- Question map in results (color-coded) -->
            <h3 style="margin-bottom:var(--sp-4);color:var(--purple-deep);">Answer Map</h3>
            <div class="qmap" id="qmapResults"></div>

            <div class="retake-row" style="margin-top:var(--sp-6);">
                <button class="retake-btn" id="retakeBtn">&#128260; Retake Exam</button>
            </div>
        </div>

    </div>

    <script>
        /* ============================================================
           EXAM DATA — AB-731
           Each question has: id, domain, domainLabel, q, correct, wrong[3]
           ============================================================ */
        const QUESTIONS = [
            { id: 1, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is generative AI?", correct: "AI that creates new content (text, images, code, audio) by predicting the next token based on patterns learned from large datasets.", wrong: ["AI that ranks existing documents by relevance to a query and returns the top results, similar to a search engine.", "AI that classifies inputs (such as emails or images) into one of several predefined categories using supervised learning.", "AI that detects anomalies in data streams by comparing new observations to a learned baseline of normal behavior."] },
            { id: 2, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "How does generative AI differ from discriminative AI?", correct: "Generative AI creates new content; discriminative AI classifies or categorizes existing data.", wrong: ["Generative AI uses transformer architectures while discriminative AI is limited to convolutional neural networks.", "Generative AI runs only in the cloud, while discriminative AI is the only category that can run on edge devices.", "Generative AI requires no training data, while discriminative AI requires a large labeled training set to function."] },
            { id: 3, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is a pretrained model?", correct: "A model trained on broad general data (e.g., GPT-4) that can perform many tasks without additional training.", wrong: ["A model whose weights have been quantized for low-precision inference on edge devices to reduce memory footprint.", "A model that has already been fine-tuned on a customer's proprietary data and shipped as a turnkey product.", "A model whose architecture (number of layers, attention heads) is fixed but whose weights are initialized randomly at first use."] },
            { id: 4, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "When should you fine-tune a model?", correct: "When you need specialized vocabulary, consistent tone, or higher domain accuracy — and prompting alone isn't enough.", wrong: ["When you need the model to answer questions over a large, frequently-updated document corpus that changes weekly.", "When you want to reduce inference latency by caching prompts and their responses inside the model weights.", "When you need to give the model access to real-time data such as current stock prices, weather, or news."] },
            { id: 5, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is prompt engineering?", correct: "The practice of crafting inputs to guide AI toward better outputs — without retraining the model.", wrong: ["The practice of designing the embedding model and chunking strategy used to populate a vector database for retrieval.", "The discipline of tuning hyperparameters (learning rate, batch size) during a fine-tuning run for optimal convergence.", "The process of authoring connector schemas in Copilot Studio so an agent can call external APIs at runtime."] },
            { id: 6, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "Name 3 prompt engineering techniques.", correct: "Zero-shot (no examples), few-shot (include examples), and chain-of-thought (step-by-step reasoning).", wrong: ["Vector embedding, semantic chunking, and re-ranking — the three steps of building a retrieval-augmented pipeline.", "Supervised fine-tuning, reinforcement learning from human feedback, and direct preference optimization.", "Tokenization, attention masking, and positional encoding — three internal mechanisms of a transformer."] },
            { id: 7, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is RAG (Retrieval-Augmented Generation)?", correct: "Retrieves relevant documents and uses them to ground the AI's response — reducing hallucinations and improving accuracy.", wrong: ["A fine-tuning technique that incrementally updates the model's weights with newly retrieved documents during inference.", "A prompt pattern that asks the model to retrieve its own internal reasoning steps before producing a final answer.", "A caching layer that stores prior model outputs and replays them when the same prompt is asked again."] },
            { id: 8, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is a token?", correct: "The basic unit AI models process (~¾ of a word). AI pricing is based on tokens consumed (input + output).", wrong: ["The vector embedding produced for a word, typically a fixed-length array of 1,536 floating-point numbers.", "The unique conversation identifier assigned by the API to correlate a request with its streamed response chunks.", "The OAuth bearer credential that authenticates an API call to the model endpoint and authorizes the request."] },
            { id: 9, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What are the main GenAI cost drivers?", correct: "Token usage, model size/capability, frequency of use, and compute resources.", wrong: ["The number of fine-tuned model copies kept warm in the deployment, plus per-region replication fees.", "Storage of training datasets in Azure Blob Storage and the egress charges for moving them between regions.", "The number of Microsoft Entra users granted Copilot licenses, regardless of whether those users are active."] },
            { id: 10, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is an AI hallucination?", correct: "When AI generates a confident but factually incorrect or fabricated response. Mitigated by RAG, grounding, and human review.", wrong: ["When the AI refuses to answer because the prompt triggered a responsible AI content filter or safety classifier.", "When the AI returns an empty response because the prompt exceeded the maximum context window length.", "When the AI's answer is correct but worded differently than the user expected, requiring rephrasing of the prompt."] },
            { id: 11, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What is bias in AI?", correct: "Systematic unfairness in outputs from biased training data, which can lead to discriminatory or unrepresentative results.", wrong: ["A statistical term for the difference between a model's predicted value and the true value, also called error.", "A regularization term added to the loss function during training to prevent overfitting on the training set.", "A configurable parameter that biases the model's output toward shorter or longer responses based on user preference."] },
            { id: 12, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "Why does data quality matter?", correct: "\u201cGarbage in, garbage out.\u201d Poor or biased data leads to unreliable AI outputs. Clean, representative data is essential.", wrong: ["Data quality affects only the embedding step of a RAG pipeline; the generation step is unaffected by source data quality.", "Data quality matters only for vision and speech models; modern language models are robust to noisy text inputs.", "Data quality is enforced automatically by Microsoft Purview before any data reaches the model, so it requires no manual review."] },
            { id: 13, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What are key AI security concerns?", correct: "Application security, data security, authentication/access control, and protection against prompt injection.", wrong: ["Data residency, region failover, and the network bandwidth between the client and the model endpoint.", "Model versioning, deprecation timelines, and the migration path when a model reaches end-of-life.", "Token throughput limits, per-minute quota enforcement, and the retry policy for rate-limited requests."] },
            { id: 14, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "When does GenAI add the MOST value?", correct: "Repetitive text tasks, summarization, drafting, Q&A over large documents, and code assistance.", wrong: ["Real-time decisioning that requires single-digit-millisecond latency, such as high-frequency trading or ad bidding.", "Deterministic numerical workloads such as financial close, tax calculation, or actuarial modeling.", "Workloads that require formal mathematical proof, such as cryptographic verification or theorem proving."] },
            { id: 15, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "When does GenAI add LESS value?", correct: "Precise calculations, real-time data without grounding, tasks requiring 100% accuracy, and highly regulated decisions.", wrong: ["Drafting a first version of a marketing email when the user already has a clear outline of the key points.", "Summarizing a long meeting transcript so a late-joining colleague can quickly catch up on what was discussed.", "Answering common employee questions over an HR policy document that has been added as a knowledge source."] },
            { id: 16, domain: "domain1", domainLabel: "Domain 1 — Business Value of Generative AI", q: "What are the stages of the ML lifecycle?", correct: "Data Collection → Preparation → Model Training → Evaluation → Deployment → Monitoring.", wrong: ["Requirements → Design → Development → Testing → Release → Maintenance — the standard software development lifecycle.", "Plan → Build → Measure → Learn — the build-measure-learn loop popularized by Lean Startup.", "Ingest → Transform → Load → Visualize — the ETL pipeline used in business intelligence and reporting."] },

            { id: 21, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What can Copilot do in Teams?", correct: "Summarize meetings, generate recaps and action items, catch up on missed discussions, and draft messages.", wrong: ["Schedule meetings across multiple time zones, send invites with default templates, and add Together Mode backgrounds.", "Configure meeting policies (recording, lobby, breakout rooms) on behalf of a tenant administrator.", "Translate a meeting recording into a different language and replace the audio track with a synthesized voiceover."] },
            { id: 22, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is the Researcher agent?", correct: "A deep research Copilot agent performing multi-step reasoning across web and org data — ideal for competitive analysis.", wrong: ["A pre-built Copilot Studio agent that summarizes academic papers from arXiv on a user-defined recurring schedule.", "A Microsoft 365 admin agent that audits how research and IP-related data is classified and labeled across SharePoint.", "A Power BI Copilot feature that generates research-style narrative reports from a connected semantic model."] },

            { id: 24, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is Microsoft Copilot Studio?", correct: "A low-code platform for building custom AI agents and chatbots that connect to external data and integrate with M365.", wrong: ["The pro-code SDK and Visual Studio extension used to build custom plugins for M365 Copilot in C# or TypeScript.", "The Microsoft Foundry workspace where developers fine-tune base models and deploy them to managed endpoints.", "The Power Platform admin center surface for governing connectors, DLP policies, and environment lifecycles."] },
            { id: 25, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is Microsoft Graph?", correct: "The API that connects Copilot to org data — emails, files, calendar, Teams chats — enabling grounded responses.", wrong: ["A reporting service that surfaces tenant-wide usage analytics for Copilot, Teams, and SharePoint to admins.", "A vector database packaged with Microsoft Foundry that indexes M365 content for retrieval-augmented generation.", "An identity service that issues access tokens to applications calling Microsoft 365 services on a user's behalf."] },
            { id: 26, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "Explain Buy vs. Extend vs. Build.", correct: "Buy = M365 Copilot as-is (fastest). Extend = customize via Copilot Studio. Build = custom apps via Azure AI / Foundry (most flexible).", wrong: ["Buy = perpetual on-prem license. Extend = renew the license annually. Build = move to a subscription model.", "Buy = consume managed AI APIs. Extend = bring your own model. Build = train a foundation model from scratch.", "Buy = sandbox tenant. Extend = pilot in a production tenant. Build = roll out organization-wide via change management."] },
            { id: 27, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is Microsoft Foundry?", correct: "Microsoft's enterprise AI platform for building, deploying, and managing custom AI — includes model catalog, Azure AI Search, and safety tools.", wrong: ["The rebranded name for the M365 admin center where IT pros assign Copilot licenses and configure tenant policies.", "A Microsoft consulting offering where Microsoft engineers build custom AI agents on a fixed-price contract.", "The successor to Power Apps that lets makers compose AI-driven canvas apps using a drag-and-drop designer."] },
            { id: 28, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is Azure AI Search?", correct: "A cloud service with vector and semantic search used to retrieve relevant content for RAG-based AI solutions.", wrong: ["The successor to Microsoft Search in SharePoint, providing tenant-wide search across files, sites, and Teams chats.", "A managed Bing-powered web search API that returns ranked web results to applications via REST.", "An indexer that crawls Azure Storage accounts and produces a Microsoft Graph data connection for M365 Copilot."] },
            { id: 29, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is Azure OpenAI Service?", correct: "A managed Azure service providing enterprise access to OpenAI models (GPT-4, DALL-E) with built-in security and compliance.", wrong: ["A Microsoft fork of the OpenAI codebase, hosted in Azure, that customers can modify and rebuild as a private model.", "A free developer tier of OpenAI's public API that is bundled with every Azure subscription up to a monthly token cap.", "A connector in Copilot Studio that lets a custom agent call OpenAI's public API using the customer's own OpenAI key."] },
            { id: 30, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "When would you choose Copilot Studio over M365 Copilot?", correct: "When you need custom workflows, external data connections (CRM, ERP), or tailored conversational experiences.", wrong: ["When the use case is summarizing Outlook email threads or rewriting paragraphs in Word, both built into M365 Copilot.", "When the user just needs a one-time ad-hoc answer over a document they have open and don't plan to reuse.", "When the organization wants Copilot embedded across all M365 surfaces with no per-scenario configuration effort."] },
            { id: 31, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "What is Azure AI Vision used for?", correct: "Image analysis, object detection, OCR (optical character recognition), and visual content processing at scale.", wrong: ["Real-time speech-to-text transcription and speaker diarization for Teams meetings and call recordings.", "Automated translation of documents between 100+ languages while preserving original layout and formatting.", "Forecasting future values in a numeric time series using built-in models tuned for retail and supply-chain data."] },
            { id: 32, domain: "domain2", domainLabel: "Domain 2 — Microsoft AI Apps & Services", q: "Match AI solution to business need.", correct: "Summarize docs → M365 Copilot. Custom chatbot → Copilot Studio. Process images → Azure AI Vision. Search knowledge base → Azure AI Search. Custom enterprise AI → Microsoft Foundry.", wrong: ["Summarize docs → Copilot Studio. Custom chatbot → M365 Copilot. Process images → Azure OpenAI. Search knowledge base → Microsoft Foundry. Custom enterprise AI → Azure AI Vision.", "Summarize docs → Azure AI Search. Custom chatbot → Azure AI Vision. Process images → Microsoft Foundry. Search knowledge base → M365 Copilot. Custom enterprise AI → Copilot Studio.", "Summarize docs → Microsoft Foundry. Custom chatbot → Azure OpenAI. Process images → Copilot Studio. Search knowledge base → Azure AI Vision. Custom enterprise AI → M365 Copilot."] },
            { id: 33, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "What are the 6 Responsible AI principles?", correct: "Fairness, Reliability & Safety, Privacy & Security, Inclusiveness, Transparency, and Accountability.", wrong: ["Confidentiality, Integrity, Availability, Authentication, Authorization, and Non-repudiation — the security CIA+ model.", "Fairness, Accuracy, Robustness, Explainability, Privacy, and Auditability — the NIST AI risk-management framework.", "People, Process, Technology, Data, Governance, and Adoption — the six Microsoft change-management pillars."] },
            { id: 34, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "Define Fairness in Responsible AI.", correct: "AI systems treat all people equitably — avoiding differential impact based on race, gender, age, or other protected characteristics.", wrong: ["AI systems achieve identical accuracy metrics on the held-out test set as on the training set, with no overfitting.", "AI systems return responses with deterministic latency regardless of which Azure region the request originated from.", "AI systems disclose their pricing tiers and quota limits transparently to all customers, with no hidden fees."] },
            { id: 35, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "Define Transparency in Responsible AI.", correct: "People should understand how AI makes decisions — through explainability, clear documentation, and disclosure of AI use.", wrong: ["The AI system publishes its training-data sources, model weights, and evaluation benchmarks as open source.", "The AI system streams its internal chain-of-thought to the user verbatim before displaying the final answer.", "The AI system surfaces a confidence score next to every output, expressed as a percentage from 0 to 100."] },
            { id: 36, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "Define Accountability in Responsible AI.", correct: "People are responsible for AI systems — with clear governance, oversight mechanisms, and ways to address harm.", wrong: ["The AI system maintains an immutable audit log of every prompt and response in Microsoft Purview for seven years.", "The AI vendor (e.g., Microsoft) assumes legal liability for any harmful output produced by the model.", "The AI system automatically rolls back to the previous model version when post-deployment metrics degrade."] },
            { id: 37, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "What is an AI Council?", correct: "A cross-functional body (IT, legal, HR, business) that guides AI strategy, sets policies, and ensures responsible deployment.", wrong: ["A small team of data scientists and ML engineers that owns model selection, fine-tuning, and deployment.", "An external advisory board of industry analysts who benchmark the organization's AI maturity against peers.", "A Microsoft Entra security group that controls who can create agents in Copilot Studio across the tenant."] },
            { id: 38, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "What are common barriers to AI adoption?", correct: "Resistance to change, lack of training, unclear ROI, data quality concerns, security fears, and no executive sponsorship.", wrong: ["Token quota limits, model deprecation timelines, region capacity constraints, and inference latency.", "Microsoft Entra licensing complexity, Conditional Access policy conflicts, and tenant federation issues.", "GPU shortages in the cloud provider, Azure region failover capacity, and reserved-instance pricing."] },
            { id: 39, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "What is an AI Champions program?", correct: "A network of early adopters who model AI use, train peers, surface feedback, and drive grassroots adoption across the org.", wrong: ["A formal certification track that all employees must complete within their first 90 days of receiving a Copilot license.", "A Microsoft partner program that recognizes consulting firms specializing in M365 Copilot deployments.", "A leaderboard inside the Copilot admin center that ranks users by prompt count and shares the top performers."] },
            { id: 40, domain: "domain3", domainLabel: "Domain 3 — Implementation & Adoption", q: "What are M365 Copilot licensing models?", correct: "Included with certain M365 SKUs, monthly per-user subscription, or pay-as-you-go. Azure AI uses per-API-call or prepaid commitment pricing.", wrong: ["A per-prompt charge billed in fractions of a cent, deducted from a prepaid Azure consumption commitment.", "A device-based license tied to the user's primary workstation, transferable when the device is replaced.", "A capacity-based license measured in Copilot Capacity Units that the tenant pools across all users."] }
        ];

        const DOMAINS = {
            domain1: { label: "Domain 1 — Business Value of Generative AI", weight: "35–40%" },
            domain2: { label: "Domain 2 — Microsoft AI Apps & Services", weight: "35–40%" },
            domain3: { label: "Domain 3 — Implementation & Adoption", weight: "20–25%" }
        };

        /* ============================================================
           STATE
           ============================================================ */
        let currentQ = 0;
        let answers = new Array(QUESTIONS.length).fill(null); // index of chosen option
        let shuffledOptions = [];   // per-question shuffled options
        let correctIndices = [];    // per-question index of correct answer in shuffled list
        let examStartTime = Date.now();
        let timerInterval = null;
        let submitted = false;

        /* ── DOM ── */
        const examPanel = document.getElementById("examPanel");
        const resultsPanel = document.getElementById("resultsPanel");
        const qNum = document.getElementById("qNum");
        const qDomain = document.getElementById("qDomain");
        const qNumLabel = document.getElementById("qNumLabel");
        const qText = document.getElementById("qText");
        const optionsList = document.getElementById("optionsList");
        const explanation = document.getElementById("explanation");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const submitBtn = document.getElementById("submitBtn");
        const progressLabel = document.getElementById("progressLabel");
        const progressFill = document.getElementById("progressFill");
        const qmap = document.getElementById("qmap");
        const examTimer = document.getElementById("examTimer");
        const markReviewBtn = document.getElementById("markReviewBtn");
        const flaggedSummary = document.getElementById("flaggedSummary");
        const flagCount = document.getElementById("flagCount");

        /* ============================================================
           INIT — shuffle options for each question
           ============================================================ */
        function initExam() {
            shuffledOptions = [];
            correctIndices = [];
            answers = new Array(QUESTIONS.length).fill(null);
            flagged = new Array(QUESTIONS.length).fill(false);
            currentQ = 0;
            submitted = false;
            examStartTime = Date.now();

            QUESTIONS.forEach((q) => {
                // Build index array [0,1,2,3] where 0 = correct
                const indices = [0, 1, 2, 3];
                // Fisher–Yates shuffle the indices
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                const allAnswers = [q.correct, ...q.wrong];
                const opts = indices.map(idx => allAnswers[idx]);
                shuffledOptions.push(opts);
                correctIndices.push(indices.indexOf(0));
            });

            buildQMap();
            renderQuestion();
            startTimer();

            examPanel.classList.remove("hidden");
            resultsPanel.classList.remove("visible");
        }

        /* ============================================================
           TIMER
           ============================================================ */
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, "0");
                const s = String(elapsed % 60).padStart(2, "0");
                examTimer.textContent = `${m}:${s}`;
            }, 1000);
        }

        /* ============================================================
           QUESTION MAP
           ============================================================ */
        function buildQMap() {
            qmap.innerHTML = QUESTIONS.map((_, i) =>
                `<div class="qmap-dot" data-qi="${i}">${i + 1}</div>`
            ).join("");
            qmap.querySelectorAll(".qmap-dot").forEach(dot => {
                dot.addEventListener("click", () => {
                    currentQ = parseInt(dot.dataset.qi);
                    renderQuestion();
                });
            });
        }

        function updateQMap() {
            qmap.querySelectorAll(".qmap-dot").forEach((dot, i) => {
                dot.classList.remove("current", "answered", "flagged");
                if (i === currentQ) dot.classList.add("current");
                else if (answers[i] !== null) dot.classList.add("answered");
                if (flagged[i]) dot.classList.add("flagged");
            });
        }

        /* ============================================================
           RENDER QUESTION
           ============================================================ */
        function renderQuestion() {
            const q = QUESTIONS[currentQ];
            const opts = shuffledOptions[currentQ];
            const letters = ["A", "B", "C", "D"];

            qNum.textContent = currentQ + 1;
            qDomain.textContent = q.domainLabel;
            qNumLabel.textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
            qText.textContent = q.q;

            const answeredIdx = answers[currentQ];

            optionsList.innerHTML = opts.map((opt, i) => {
                let cls = "option-btn";
                if (submitted) {
                    cls += " locked";
                    if (i === correctIndices[currentQ]) cls += " correct";
                    else if (i === answeredIdx && i !== correctIndices[currentQ]) cls += " incorrect";
                } else if (i === answeredIdx) {
                    cls += " selected";
                }
                return `<button class="${cls}" data-oi="${i}">
                    <span class="option-letter">${letters[i]}</span>
                    <span class="option-text">${opt}</span>
                </button>`;
            }).join("");

            if (!submitted) {
                optionsList.querySelectorAll(".option-btn").forEach(btn => {
                    btn.addEventListener("click", () => selectOption(parseInt(btn.dataset.oi)));
                });
            }

            // Explanation after submit
            if (submitted) {
                explanation.textContent = `Correct answer: ${q.correct}`;
                explanation.classList.add("visible");
            } else {
                explanation.classList.remove("visible");
            }

            // Progress
            const answered = answers.filter(a => a !== null).length;
            const pct = Math.round((answered / QUESTIONS.length) * 100);
            progressLabel.textContent = `${pct}% complete (${answered}/${QUESTIONS.length} answered)`;
            progressFill.style.width = `${pct}%`;

            // Nav buttons
            prevBtn.disabled = currentQ === 0;
            if (submitted) {
                nextBtn.style.display = currentQ < QUESTIONS.length - 1 ? "" : "none";
                submitBtn.style.display = "none";
                markReviewBtn.style.display = "none";
                flaggedSummary.style.display = "none";
            } else {
                nextBtn.style.display = currentQ < QUESTIONS.length - 1 ? "" : "none";
                submitBtn.style.display = answered === QUESTIONS.length ? "" : "none";
                updateFlagUI();
            }

            updateQMap();
        }

        function selectOption(idx) {
            if (submitted) return;
            answers[currentQ] = idx;
            renderQuestion();
        }

        /* ============================================================
           MARK FOR REVIEW
           ============================================================ */
        function toggleFlag() {
            if (submitted) return;
            flagged[currentQ] = !flagged[currentQ];
            updateFlagUI();
            updateQMap();
        }

        function updateFlagUI() {
            const isFlagged = flagged[currentQ];
            markReviewBtn.classList.toggle("flagged", isFlagged);
            markReviewBtn.innerHTML = isFlagged ? "&#9873; Marked" : "&#9873; Mark for Review";
            markReviewBtn.style.display = "";

            const total = flagged.filter(Boolean).length;
            if (total > 0) {
                flaggedSummary.style.display = "";
                flagCount.textContent = total;
            } else {
                flaggedSummary.style.display = "none";
            }
        }

        function jumpToNextFlagged() {
            const total = flagged.filter(Boolean).length;
            if (total === 0) return;
            // Search forward from current, wrapping around
            for (let offset = 1; offset <= QUESTIONS.length; offset++) {
                const idx = (currentQ + offset) % QUESTIONS.length;
                if (flagged[idx]) {
                    currentQ = idx;
                    renderQuestion();
                    return;
                }
            }
        }

        /* ============================================================
           SUBMIT
           ============================================================ */
        function submitExam() {
            if (!confirm("Submit your exam? You won't be able to change answers.")) return;
            submitted = true;
            if (timerInterval) clearInterval(timerInterval);
            showResults();
        }

        function showResults() {
            examPanel.classList.add("hidden");
            resultsPanel.classList.add("visible");

            let totalCorrect = 0;
            const domainStats = {};
            const missed = [];

            QUESTIONS.forEach((q, i) => {
                if (!domainStats[q.domain]) domainStats[q.domain] = { total: 0, correct: 0 };
                domainStats[q.domain].total++;
                if (answers[i] === correctIndices[i]) {
                    totalCorrect++;
                    domainStats[q.domain].correct++;
                } else {
                    missed.push({
                        id: q.id,
                        question: q.q,
                        domain: q.domainLabel,
                        yourAnswer: answers[i] !== null ? shuffledOptions[i][answers[i]] : "(unanswered)",
                        correctAnswer: q.correct
                    });
                }
            });

            const score = Math.round((totalCorrect / QUESTIONS.length) * 1000);
            const passed = score >= 700;

            // Score hero
            const scoreNumber = document.getElementById("scoreNumber");
            scoreNumber.textContent = score;
            scoreNumber.className = "score-number " + (passed ? "pass" : "fail");

            const scoreBadge = document.getElementById("scoreBadge");
            scoreBadge.innerHTML = `<span class="score-badge ${passed ? "pass" : "fail"}">${passed ? "PASS ✓" : "FAIL ✗"}</span>`;

            document.getElementById("scoreSubtitle").textContent =
                `${totalCorrect} of ${QUESTIONS.length} correct · Passing: 700 · Time: ${examTimer.textContent}`;

            // Domain breakdown
            const domainBreakdown = document.getElementById("domainBreakdown");
            domainBreakdown.innerHTML = Object.entries(DOMAINS).map(([key, d]) => {
                const s = domainStats[key] || { total: 0, correct: 0 };
                const pct = s.total ? Math.round((s.correct / s.total) * 100) : 0;
                const dp = pct >= 70;
                return `<div class="domain-card">
                    <div class="domain-card-title">${d.label} <span style="opacity:.5">(${d.weight})</span></div>
                    <div class="domain-score ${dp ? "pass" : "fail"}">${pct}%</div>
                    <div class="domain-detail">${s.correct} / ${s.total} correct</div>
                    <div class="domain-bar-track"><div class="domain-bar-fill ${dp ? "pass" : "fail"}" style="width:${pct}%"></div></div>
                </div>`;
            }).join("");

            // Missed questions
            const missedList = document.getElementById("missedList");
            if (missed.length === 0) {
                missedList.innerHTML = '<div class="all-correct-msg">Perfect score! You answered every question correctly.</div>';
            } else {
                missedList.innerHTML = missed.map(m =>
                    `<div class="missed-item">
                        <div class="missed-q">Q${String(m.id).padStart(2, "0")}: ${m.question}</div>
                        <div class="missed-your">Your answer: ${m.yourAnswer}</div>
                        <div class="missed-correct">Correct: ${m.correctAnswer}</div>
                    </div>`
                ).join("");
            }

            // Results question map
            const qmapResults = document.getElementById("qmapResults");
            qmapResults.innerHTML = QUESTIONS.map((_, i) => {
                const isCorrect = answers[i] === correctIndices[i];
                return `<div class="qmap-dot ${isCorrect ? "correct-dot" : "incorrect-dot"}" data-qi="${i}" title="Q${i + 1}">${i + 1}</div>`;
            }).join("");
            qmapResults.querySelectorAll(".qmap-dot").forEach(dot => {
                dot.addEventListener("click", () => {
                    currentQ = parseInt(dot.dataset.qi);
                    examPanel.classList.remove("hidden");
                    resultsPanel.classList.remove("visible");
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        }

        /* ============================================================
           EVENT LISTENERS
           ============================================================ */
        prevBtn.addEventListener("click", () => { if (currentQ > 0) { currentQ--; renderQuestion(); } });
        nextBtn.addEventListener("click", () => { if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); } });
        markReviewBtn.addEventListener("click", toggleFlag);
        flaggedSummary.addEventListener("click", jumpToNextFlagged);
        submitBtn.addEventListener("click", submitExam);
        document.getElementById("retakeBtn").addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
            initExam();
        });

        document.addEventListener("keydown", (e) => {
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
            if (submitted && (e.key === "ArrowRight" || e.key === "ArrowLeft")) {
                e.preventDefault();
                if (e.key === "ArrowRight" && currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); }
                if (e.key === "ArrowLeft" && currentQ > 0) { currentQ--; renderQuestion(); }
                return;
            }
            if (submitted) return;
            switch (e.key) {
                case "ArrowRight": e.preventDefault(); if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); } break;
                case "ArrowLeft": e.preventDefault(); if (currentQ > 0) { currentQ--; renderQuestion(); } break;
                case "a": case "A": e.preventDefault(); selectOption(0); break;
                case "b": case "B": e.preventDefault(); selectOption(1); break;
                case "c": case "C": e.preventDefault(); selectOption(2); break;
                case "d": case "D": e.preventDefault(); selectOption(3); break;
                case "m": case "M": e.preventDefault(); toggleFlag(); break;
            }
        });

        /* ============================================================
           INIT
           ============================================================ */
        initExam();
    </script>
