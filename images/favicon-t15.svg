<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0F3D3E"/>
            <stop offset="100%" stop-color="#14B8A6"/>
        </linearGradient>
    </defs>
    <rect width="32" height="32" rx="6" fill="url(#g)"/>
    <!-- Robot/agent head -->
    <rect x="8" y="10" width="16" height="14" rx="3" fill="#fff" opacity=".92"/>
    <!-- Antenna -->
    <line x1="16" y1="10" x2="16" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="16" cy="5" r="1.6" fill="#F0C040"/>
    <!-- Eyes -->
    <circle cx="12.5" cy="16" r="1.6" fill="#0F3D3E"/>
    <circle cx="19.5" cy="16" r="1.6" fill="#0F3D3E"/>
    <!-- Mouth -->
    <rect x="12" y="20" width="8" height="1.6" rx=".8" fill="#0F3D3E"/>
    <!-- Side vents -->
    <rect x="6" y="14" width="1.5" height="6" rx=".6" fill="#fff" opacity=".5"/>
    <rect x="24.5" y="14" width="1.5" height="6" rx=".6" fill="#fff" opacity=".5"/>
</svg>
